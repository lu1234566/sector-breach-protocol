; NOTE: written without compiling/opening this project in Unreal Engine 5.5.
; Gameplay input is driven entirely by Enhanced Input (see DOCCharacter.h/.cpp
; and EDITOR_TODO.md for the Input Action / Input Mapping Context assets that
; still need to be created in the Editor). This file only wires the engine to
; use the Enhanced Input classes by default; it intentionally defines no
; legacy ActionMappings/AxisMappings.

[/Script/Engine.InputSettings]
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent
bEnableLegacyInputScales=False
bEnableMouseSmoothing=False
